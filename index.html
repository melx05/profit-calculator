<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profit Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 50px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      background: #00ffcc;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>💰 Profit Calculator</h1>

  <input type="number" id="cost" placeholder="Product Cost"><br>
  <input type="number" id="price" placeholder="Selling Price"><br>
  <input type="number" id="extra" placeholder="Extra Costs"><br><br>

  <button onclick="calculate()">Calculate</button>

  <h2 id="result"></h2>

  <script>
    function calculate() {
      let cost = Number(document.getElementById("cost").value);
      let price = Number(document.getElementById("price").value);
      let extra = Number(document.getElementById("extra").value);

      let profit = price - (cost + extra);
      let margin = (profit / price) * 100;

      document.getElementById("result").innerText =
        "Profit: $" + profit + " | Margin: " + margin.toFixed(2) + "%";
    }
  </script>

</body>
</html>
